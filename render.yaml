services:
  - type: web
    name: sentinel
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py serve
    healthCheckPath: /health
    envVars:
      - key: PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION
        value: python
      - key: LLM_PROVIDER
        value: cascade
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: API_SECRET_KEY
        generateValue: true
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma
      - key: LOG_FILE
        value: /data/logs/sentinel.log
    disk:
      name: sentinel-data
      mountPath: /data
      sizeGB: 1
